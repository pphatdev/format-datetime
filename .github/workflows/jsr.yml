name: Publish

on:
  push:
    tags:
      - 'v*' # Trigger when you push a tag like v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # The OIDC ID token is used for authentication with JSR.
    steps:
      - uses: actions/checkout@v6
      - run: npx jsr publish
